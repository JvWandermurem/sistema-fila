version: '3.8'

services:
  api:
    build: ./ingestao-massiva
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://admin:password123@postgres:5432/massivedb
      - RABBITMQ_URL=amqp://admin:password123@rabbitmq:5672/%2f
    restart: on-failure
    depends_on:
      - postgres
      - rabbitmq
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: massivedb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  pgdata: